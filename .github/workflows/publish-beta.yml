name: publish-beta

on:
  push:
    tags:
      - "components-v*-beta.*"
      - "shared-v*-beta.*"

permissions:
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      package_key: ${{ steps.metadata.outputs.package_key }}
      package_dir: ${{ steps.metadata.outputs.package_dir }}
      package_name: ${{ steps.metadata.outputs.package_name }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve publish metadata
        id: metadata
        run: node scripts/publish-beta.mjs metadata "${{ github.ref_name }}" --github-output "$GITHUB_OUTPUT"

      - name: Run beta publish verification
        run: node scripts/publish-beta.mjs verify "${{ github.ref_name }}"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish beta package to GitHub Packages
        run: node scripts/publish-beta.mjs publish "${{ github.ref_name }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
