name: publish-beta

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - components
          - shared
      version:
        description: Beta version like 0.1.0-beta.1
        required: true
        type: string
      ref:
        description: Git ref to publish from
        required: false
        default: main
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      package_key: ${{ steps.metadata.outputs.package_key }}
      package_dir: ${{ steps.metadata.outputs.package_dir }}
      package_name: ${{ steps.metadata.outputs.package_name }}
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      ref_sha: ${{ steps.ref.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve publish ref
        id: ref
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve publish metadata
        id: metadata
        run: node scripts/publish-beta.mjs metadata "${{ inputs.package }}" "${{ inputs.version }}" --github-output "$GITHUB_OUTPUT"

      - name: Run beta publish verification
        run: node scripts/publish-beta.mjs verify "${{ inputs.package }}" "${{ inputs.version }}"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.ref_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish beta package to GitHub Packages
        run: node scripts/publish-beta.mjs publish "${{ needs.validate.outputs.package_key }}" "${{ needs.validate.outputs.version }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag:
    needs:
      - validate
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.ref_sha }}

      - name: Create success tag
        run: node scripts/publish-beta.mjs create-tag "${{ needs.validate.outputs.package_key }}" "${{ needs.validate.outputs.version }}" --ref "${{ needs.validate.outputs.ref_sha }}"
